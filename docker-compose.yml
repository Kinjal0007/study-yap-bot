services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yap
      POSTGRES_PASSWORD: yap
      POSTGRES_DB: yap
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    image: ghcr.io/kinjal0007/study-yap-bot:latest
    restart: unless-stopped
    depends_on:
      - postgres
    env_file: .env
    environment:
      DATABASE_URL: postgresql://yap:yap@postgres:5432/yap

volumes:
  postgres_data:
